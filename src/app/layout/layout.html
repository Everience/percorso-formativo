<header>
  <app-profile-menu></app-profile-menu>
  <h3>BENVENUTO/A!</h3>
  <h1>Ecco il tuo percorso di formazione</h1>
</header>

<main>
  <div class="top-links">
    <app-udemy-access-instructions></app-udemy-access-instructions>
    <span class="separator">|</span>
    <a routerLink="/user-manual" class="manual-link">Manuale utente</a>
  </div>
  <router-outlet></router-outlet>
</main>

@if (courseDetailService.selectedCourse()) {
<div class="overlay" (click)="courseDetailService.close()"></div>
}

<aside class="sidebar" [class.sidebar--open]="courseDetailService.selectedCourse()">
  <app-course-details></app-course-details>
</aside>
