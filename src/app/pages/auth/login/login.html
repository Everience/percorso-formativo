<header>
  <img src="./images/logo/logo.jpg" alt="Logo" (click)="refreshPage()">
  <h2>Accedi</h2>
</header>
<main>
  <form (submit)="onSubmit($event)">
    @if (loginError()) {
    <div class="error-banner">
      <span>{{ loginError() }}</span>
      <button type="button" class="error-close" (click)="dismissError()">
        <img src="./images/icons/close.svg" alt="Close">
      </button>
    </div>
    }

    <div class="form-field">
      <label for="username">Email</label>
      <div class="email-input-group">
        <input id="username" type="text" [formField]="loginForm.username" autocomplete="username" />
        <span class="email-suffix">@everience.com</span>
      </div>
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <input id="password" type="password" [formField]="loginForm.password" autocomplete="current-password" />
    </div>

    <button type="submit" [disabled]="loading()">{{ loading() ? 'Accesso...' : 'Accedi' }}</button>
  </form>
  <a class="forgot-password-link" routerLink="/forgot-password">Password dimenticata?</a>
  <p class="auth-switch">Non hai un account? <a routerLink="/signup">Registrati</a></p>
</main>
